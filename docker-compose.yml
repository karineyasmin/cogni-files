version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: cognifiles_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: secret_password

volumes:
  mongo_data: